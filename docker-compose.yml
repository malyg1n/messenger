services:
  
  frontend:
    image: node:24
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"

  postgres:
    image: postgres:17
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chat
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql


  kafka:
    image: redpandadata/redpanda:v24.1.2
    container_name: kafka
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --node-id 0
      - --check=false

    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info"]
      interval: 5s
      retries: 10

  api:
    image: golang:1.25
    working_dir: /app

    volumes:
      - ./api-service:/app
    command: sh -c "go install github.com/air-verse/air@latest && air -c .air.toml"
    ports:
      - "8081:8081"
    depends_on:
      - postgres


  ws:
    image: golang:1.25
    working_dir: /app
    volumes:
      - ./ws-service:/app
    environment:
      APP_ENV: dev
    command: sh -c "go install github.com/air-verse/air@latest && air -c .air.toml"
    ports:
      - "8080:8080"
    depends_on:
      - kafka


  msg:
    image: golang:1.25
    working_dir: /app
    volumes:
      - ./message-service:/app
    command: sh -c "go install github.com/air-verse/air@latest && air -c .air.toml"
    depends_on:
      - kafka
      - postgres